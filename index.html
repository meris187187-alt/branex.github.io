<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branex Busovača | Premium Transport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #FFD700; --dark-color: #0f0f0f; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; }
        
        .navbar { background: var(--dark-color); padding: 20px 0; border-bottom: 5px solid var(--main-color); }
        .framed-box { border: 3px solid var(--main-color); padding: 8px 20px; display: inline-block; text-transform: uppercase; font-weight: 900; color: white; text-decoration: none; }
        
        .hero { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519003722824-194d4455a60c?q=80&w=2000'); height: 60vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        
        section { padding: 80px 0; }
        
        /* POPRAVLJENI OKVIRI ZA FORMULAR */
        .premium-frame {
            border: 4px solid var(--dark-color);
            padding: 40px;
            background: #fafafa;
            position: relative;
        }
        .frame-label {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--main-color);
            color: black;
            padding: 2px 15px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .form-control {
            border: 2px solid var(--dark-color) !important;
            border-radius: 0 !important;
            padding: 12px !important;
            margin-bottom: 15px;
        }
        
        .btn-send {
            background: var(--main-color);
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: 900;
            text-transform: uppercase;
            width: 100%;
            transition: 0.3s;
        }
        .btn-send:hover { background: var(--dark-color); color: white; }

        .footer { background: #000; color: #555; padding: 30px 0; text-align: center; border-top: 5px solid var(--main-color); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container text-center">
        <a class="framed-box" href="#">BRANEX <span style="color:var(--main-color)">BUSOVAČA</span></a>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1 class="display-3 fw-bold">PREMIUM LOGISTIKA</h1>
        <p class="lead">Vaš siguran partner za cijelu Evropu.</p>
    </div>
</section>

<section>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="premium-frame shadow-lg">
                    <div class="frame-label">Pošaljite upit</div>
                    <h2 class="fw-bold mb-4">ZATRAŽITE PONUDU</h2>
                    <form>
                        <input type="text" class="form-control" placeholder="Vaše Ime">
                        <input type="email" class="form-control" placeholder="Vaš Email">
                        <textarea class="form-control" rows="5" placeholder="Destinacija, težina i vrsta robe..."></textarea>
                        <button type="button" class="btn-send shadow">POŠALJI UPIT</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 BRANEX BUSOVAČA | LOGISTICS</p>
</footer>

</body>
</html>
