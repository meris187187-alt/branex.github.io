<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branex Busovača | Prototip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #FFD700; --dark-color: #0f0f0f; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .navbar { background: var(--dark-color); padding: 20px 0; border-bottom: 5px solid var(--main-color); text-align: center; }
        .framed-box { border: 3px solid var(--main-color); padding: 8px 20px; display: inline-block; text-transform: uppercase; font-weight: 900; color: white; text-decoration: none; letter-spacing: 2px; }
        .hero { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519003722824-194d4455a60c?q=80&w=2000'); height: 50vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        section { padding: 80px 0; }
        .premium-frame {
            border: 6px solid var(--dark-color);
            padding: 50px;
            background: #fafafa;
            position: relative;
            box-shadow: 15px 15px 0px var(--main-color);
        }
        .frame-label {
            position: absolute;
            top: -20px;
            left: 30px;
            background: var(--main-color);
            color: black;
            padding: 5px 20px;
            font-weight: 900;
            text-transform: uppercase;
            border: 3px solid var(--dark-color);
        }
        .form-control {
            border: 3px solid var(--dark-color) !important;
            border-radius: 0 !important;
            padding: 15px !important;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .btn-send {
            background: var(--dark-color);
            color: var(--main-color);
            border: none;
            padding: 20px;
            font-weight: 900;
            text-transform: uppercase;
            width: 100%;
            font-size: 1.2rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-send:hover { background: var(--main-color); color: black; }
        .footer { background: #000; color: #555; padding: 30px 0; text-align: center; border-top: 5px solid var(--main-color); }
    </style>
</head>
<body>
<nav class="navbar"><a class="framed-box" href="#">BRANEX <span style="color:var(--main-color)">BUSOVAČA</span></a></nav>
<section class="hero"><div class="container"><h1 class="display-3 fw-bold">BRANEX <span style="color:var(--main-color)">LOGISTIKA</span></h1><p class="lead fs-3">Premium transport rješenja.</p></div></section>
<section><div class="container"><div class="row justify-content-center"><div class="col-lg-8"><div class="premium-frame"><div class="frame-label">Klijent Panel</div><h2 class="fw-bold mb-4">ZATRAŽITE PONUDU</h2><form><input type="text" class="form-control" placeholder="VAŠE IME"><input type="email" class="form-control" placeholder="VAŠ EMAIL"><textarea class="form-control" rows="5" placeholder="DETALJI TRANSPORTA..."></textarea><button type="button" class="btn-send">POŠALJI ZAHTJEV</button></form></div></div></div></div></section>
<footer class="footer"><p>© 2026 BRANEX BUSOVAČA</p></footer>
</body>
</html>
